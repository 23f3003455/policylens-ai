<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolicyLens AI — Samjho Apni Policy</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Inter', sans-serif;
      background: linear-gradient(160deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
      min-height: 100vh;
      color: #333;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 48px 20px 28px;
    }
    .header h1 {
      font-size: 2.6rem;
      font-weight: 800;
      color: white;
      letter-spacing: -1px;
    }
    .header h1 .gradient {
      background: linear-gradient(90deg, #f093fb, #f5a623);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .tagline {
      margin-top: 10px;
      color: rgba(255,255,255,0.65);
      font-size: 1.05rem;
    }

    /* ── Layout ── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── Card shared ── */
    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      color: #111;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      appearance: none;
    }
    .form-group input::placeholder { color: #9ca3af; }
    .form-group input:focus,
    .form-group select:focus {
      border-color: #7c3aed;
      background: #fff;
    }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #6b7280;
      font-size: 1rem;
    }

    /* ── Two-column form row ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row .form-group { margin-bottom: 0; }
    @media (max-width: 560px) { .form-row { grid-template-columns: 1fr; } }

    /* ── Language badge on output ── */
    .lang-badge {
      font-size: 0.78rem;
      color: #7c3aed;
      font-weight: 600;
      margin-top: 4px;
    }

    /* ── Button ── */
    .form-row + .btn-explain { margin-top: 20px; }
    .btn-explain {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      letter-spacing: 0.2px;
    }
    .btn-explain:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(124,58,237,0.45);
    }
    .btn-explain:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Loading ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 44px;
      color: rgba(255,255,255,0.75);
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #f093fb;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 1rem;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.45; } }

    /* ── Error ── */
    .error-box {
      margin-top: 20px;
      padding: 16px 20px;
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      color: #991b1b;
      font-size: 0.95rem;
      text-align: center;
    }

    /* ── Output card ── */
    .output-card {
      margin-top: 24px;
      animation: fadeUp 0.4s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 26px;
      padding-bottom: 18px;
      border-bottom: 2px solid #f0f0f0;
    }
    .output-title {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e1b4b;
    }
    .btn-copy {
      padding: 8px 16px;
      background: #f3f4f6;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      color: #4b5563;
      transition: background 0.2s, color 0.2s;
    }
    .btn-copy:hover { background: #7c3aed; color: #fff; }
    .btn-copy.copied { background: #10b981; color: #fff; }

    /* ── Sections ── */
    .section { margin-bottom: 22px; }
    .section-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .s1 .section-tag { background: #ede9fe; color: #6d28d9; }
    .s2 .section-tag { background: #fef3c7; color: #b45309; }
    .s3 .section-tag { background: #dbeafe; color: #1d4ed8; }
    .s4 .section-tag { background: #d1fae5; color: #065f46; }
    .s5 .section-tag { background: #fee2e2; color: #991b1b; }
    .s6 .section-tag { background: #f3f4f6; color: #374151; }

    .section-body {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #374151;
    }

    /* Pros / Cons grid */
    .pros-cons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 22px;
    }
    @media (max-width: 560px) {
      .pros-cons-grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 2rem; }
    }

    .bullet-list { list-style: none; padding: 0; }
    .bullet-list li {
      padding: 5px 0 5px 22px;
      position: relative;
      font-size: 0.93rem;
      line-height: 1.6;
      color: #374151;
    }
    .pros-list li::before { content: '✓'; position:absolute; left:0; color:#10b981; font-weight:700; }
    .cons-list li::before { content: '✗'; position:absolute; left:0; color:#ef4444; font-weight:700; }

    /* Summary */
    .summary-box {
      background: linear-gradient(135deg, rgba(124,58,237,0.07), rgba(168,85,247,0.07));
      border-left: 4px solid #7c3aed;
      padding: 16px 20px;
      border-radius: 0 10px 10px 0;
      font-style: italic;
      color: #374151;
      line-height: 1.75;
      font-size: 0.95rem;
    }

    .divider { height: 1px; background: #f0f0f0; margin: 20px 0; }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 20px;
      color: rgba(255,255,255,0.3);
      font-size: 0.8rem;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const USER_TYPES = [
      { value: 'general',        label: '🧑 General Citizen' },
      { value: 'student',        label: '🎓 Student' },
      { value: 'job_seeker',     label: '💼 Job Seeker' },
      { value: 'business_owner', label: '🏪 Business Owner' },
    ];

    const LANGUAGES = [
      { value: 'hinglish',  label: '🇮🇳 Hinglish (Hindi + English)' },
      { value: 'hindi',     label: '🔵 Hindi — हिंदी' },
      { value: 'bengali',   label: '🟠 Bengali — বাংলা' },
      { value: 'telugu',    label: '🟡 Telugu — తెలుగు' },
      { value: 'marathi',   label: '🟣 Marathi — मराठी' },
      { value: 'tamil',     label: '🔴 Tamil — தமிழ்' },
      { value: 'gujarati',  label: '🟢 Gujarati — ગુજરાતી' },
      { value: 'kannada',   label: '🔷 Kannada — ಕನ್ನಡ' },
      { value: 'malayalam', label: '🟤 Malayalam — മലയാളം' },
      { value: 'punjabi',   label: '🟨 Punjabi — ਪੰਜਾਬੀ' },
      { value: 'odia',      label: '⚪ Odia — ଓଡ଼ିଆ' },
    ];

    function OutputCard({ result, policyName, languageLabel }) {
      const [copied, setCopied] = useState(false);

      function buildPlainText() {
        return [
          `PolicyLens AI — ${policyName}`,
          '',
          '💬 Saral Explanation',
          result.simple_explanation,
          '',
          '🤔 Yeh Kyun Aayi?',
          result.why_introduced,
          '',
          '👤 Aap Par Kya Asar?',
          result.personal_impact,
          '',
          '✅ Fayde (Pros)',
          ...result.pros.map(p => `• ${p}`),
          '',
          '❌ Nuksan (Cons)',
          ...result.cons.map(c => `• ${c}`),
          '',
          '📌 Summary',
          result.summary,
        ].join('\n');
      }

      function handleCopy() {
        navigator.clipboard.writeText(buildPlainText()).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2200);
        });
      }

      return (
        <div className="card output-card">
          <div className="output-header">
            <div>
              <div className="output-title">📋 {policyName}</div>
              <div className="lang-badge">{languageLabel}</div>
            </div>
            <button
              className={`btn-copy${copied ? ' copied' : ''}`}
              onClick={handleCopy}
            >
              {copied ? '✓ Copied!' : '📋 Copy'}
            </button>
          </div>

          <div className="section s1">
            <div className="section-tag">💬 Saral Explanation</div>
            <div className="section-body">{result.simple_explanation}</div>
          </div>

          <div className="divider" />

          <div className="section s2">
            <div className="section-tag">🤔 Yeh Kyun Aayi?</div>
            <div className="section-body">{result.why_introduced}</div>
          </div>

          <div className="divider" />

          <div className="section s3">
            <div className="section-tag">👤 Aap Par Kya Asar?</div>
            <div className="section-body">{result.personal_impact}</div>
          </div>

          <div className="divider" />

          <div className="pros-cons-grid">
            <div className="section s4">
              <div className="section-tag">✅ Fayde (Pros)</div>
              <ul className="bullet-list pros-list">
                {result.pros.map((p, i) => <li key={i}>{p}</li>)}
              </ul>
            </div>
            <div className="section s5">
              <div className="section-tag">❌ Nuksan (Cons)</div>
              <ul className="bullet-list cons-list">
                {result.cons.map((c, i) => <li key={i}>{c}</li>)}
              </ul>
            </div>
          </div>

          <div className="divider" />

          <div className="section s6">
            <div className="section-tag">📌 Summary</div>
            <div className="summary-box">{result.summary}</div>
          </div>
        </div>
      );
    }

    function App() {
      const [policy, setPolicy]           = useState('');
      const [userType, setUserType]       = useState('general');
      const [language, setLanguage]       = useState('hinglish');
      const [loading, setLoading]         = useState(false);
      const [result, setResult]           = useState(null);
      const [error, setError]             = useState('');
      const [displayPolicy, setDisplayPolicy] = useState('');
      const [displayLang, setDisplayLang] = useState('');

      async function handleSubmit(e) {
        e.preventDefault();
        if (!policy.trim()) return;

        setLoading(true);
        setResult(null);
        setError('');
        setDisplayPolicy(policy.trim());
        setDisplayLang(LANGUAGES.find(l => l.value === language)?.label || '');

        try {
          const res = await fetch('/api/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ policy: policy.trim(), userType, language }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          setResult(data.result);
        } catch (err) {
          setError(err.message || 'Kuch problem ho gayi. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <>
          <div className="header">
            <h1>Policy<span className="gradient">Lens</span> AI</h1>
            <p className="tagline">Koi bhi sarkari policy samjho — apni bhasha mein 🇮🇳</p>
          </div>

          <div className="container">
            <div className="card">
              <form onSubmit={handleSubmit}>
                <div className="form-group">
                  <label>Policy ka naam likhein</label>
                  <input
                    type="text"
                    value={policy}
                    onChange={e => setPolicy(e.target.value)}
                    placeholder="e.g., GST, Budget 2024, NEP, Farm Bills, MGNREGA..."
                    disabled={loading}
                    autoFocus
                  />
                </div>

                <div className="form-row">
                  <div className="form-group">
                    <label>Aap kaun hain?</label>
                    <div className="select-wrapper">
                      <select
                        value={userType}
                        onChange={e => setUserType(e.target.value)}
                        disabled={loading}
                      >
                        {USER_TYPES.map(t => (
                          <option key={t.value} value={t.value}>{t.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="form-group">
                    <label>Bhasha chunein (Language)</label>
                    <div className="select-wrapper">
                      <select
                        value={language}
                        onChange={e => setLanguage(e.target.value)}
                        disabled={loading}
                      >
                        {LANGUAGES.map(l => (
                          <option key={l.value} value={l.value}>{l.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>

                <button
                  type="submit"
                  className="btn-explain"
                  disabled={loading || !policy.trim()}
                >
                  {loading ? '⏳ Analyzing policy...' : '🔍 Explain Policy'}
                </button>
              </form>
            </div>

            {loading && (
              <div className="loading-wrap">
                <div className="spinner" />
                <div className="loading-text">Analyzing policy... ek second 🙏</div>
              </div>
            )}

            {error && !loading && (
              <div className="error-box">⚠️ {error}</div>
            )}

            {result && !loading && (
              <OutputCard result={result} policyName={displayPolicy} languageLabel={displayLang} />
            )}
          </div>

          <div className="footer">
            PolicyLens AI — Powered by Claude AI &nbsp;•&nbsp; Made for India 🇮🇳
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
