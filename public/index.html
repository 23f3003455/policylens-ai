<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PolicyLens AI — Makes Policy Understanding Easy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      /* warm dark base + subtle rangoli dot grid */
      background-color: #0d0905;
      background-image: radial-gradient(rgba(255,153,51,0.045) 1px, transparent 1px);
      background-size: 28px 28px;
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    /* ── Animated blobs (saffron / India green / peacock) ── */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.16;
    }
    .blob-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, #FF9933, #DC6803);
      top: -250px; left: -200px;
      animation: blobDrift1 18s ease-in-out infinite;
    }
    .blob-2 {
      width: 550px; height: 550px;
      background: radial-gradient(circle, #16a34a, #14532d);
      top: 20%; right: -180px;
      animation: blobDrift2 22s ease-in-out infinite;
    }
    .blob-3 {
      width: 450px; height: 450px;
      background: radial-gradient(circle, #0891b2, #0e4f66);
      bottom: 8%; left: 10%;
      animation: blobDrift3 20s ease-in-out infinite;
    }
    @keyframes blobDrift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%      { transform: translate(50px,-40px) scale(1.07); }
      70%      { transform: translate(-30px,30px) scale(0.94); }
    }
    @keyframes blobDrift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      35%      { transform: translate(-60px,50px) scale(1.1); }
      65%      { transform: translate(40px,-30px) scale(0.92); }
    }
    @keyframes blobDrift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%      { transform: translate(40px,-50px) scale(1.06); }
    }

    /* ── Ashoka Chakra watermark ── */
    .ashoka-bg {
      position: fixed;
      top: -140px;
      left: 50%;
      transform: translateX(-50%);
      width: 520px; height: 520px;
      z-index: 0;
      pointer-events: none;
    }
    .ashoka {
      width: 100%; height: 100%;
      color: #FF9933;
      opacity: 0.055;
      animation: slowSpin 120s linear infinite;
      transform-origin: center center;
    }
    @keyframes slowSpin { to { transform: rotate(360deg); } }

    /* ── Layout ── */
    .page-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 70px 20px 44px;
    }
    .ai-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,153,51,0.12);
      border: 1px solid rgba(255,153,51,0.3);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      color: #fdba74;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 22px;
    }
    .ai-badge::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: #FB923C;
      border-radius: 50%;
      box-shadow: 0 0 8px #FB923C;
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

    .header h1 {
      font-size: 3.2rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2.5px;
      line-height: 1;
    }
    /* tricolor gradient: saffron → gold → India green */
    .header h1 .gradient {
      background: linear-gradient(135deg, #FF9933 0%, #FBBF24 45%, #16a34a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header .tagline {
      margin-top: 14px;
      color: rgba(255,255,255,0.4);
      font-size: 0.97rem;
      font-weight: 400;
      letter-spacing: 0.2px;
    }
    /* decorative tricolor stripe under header */
    .tricolor-stripe {
      display: flex;
      justify-content: center;
      gap: 0;
      margin: 28px auto 0;
      width: 120px;
      height: 3px;
      border-radius: 2px;
      overflow: hidden;
    }
    .tricolor-stripe span {
      flex: 1;
    }
    .tricolor-stripe .tc-saffron { background: #FF9933; }
    .tricolor-stripe .tc-white   { background: rgba(255,255,255,0.5); }
    .tricolor-stripe .tc-green   { background: #138808; }

    /* ── Container ── */
    .container {
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px 60px;
      flex: 1;
    }

    /* ── Glass card + tricolor top border ── */
    .card {
      background: rgba(255,255,255,0.032);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 32px;
      position: relative;
      overflow: hidden;
    }
    /* glass top-left sheen */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 55%);
      pointer-events: none;
    }
    /* tricolor top accent bar */
    .card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2.5px;
      background: linear-gradient(
        90deg,
        #FF9933 0%,   #FF9933 33.3%,
        rgba(255,255,255,0.35) 33.3%, rgba(255,255,255,0.35) 66.6%,
        #138808 66.6%, #138808 100%
      );
      opacity: 0.8;
    }

    /* ── Form ── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 13px 16px;
      background: rgba(255,255,255,0.055);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      color: #fff;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      appearance: none;
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.22); }
    .form-group input:focus,
    .form-group select:focus {
      border-color: rgba(255,153,51,0.55);
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(255,153,51,0.12);
    }
    .form-group select option {
      background: #1a0f05;
      color: #fff;
    }
    .select-wrapper { position: relative; }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
    }

    /* ── Two-column row ── */
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .form-row .form-group { margin-bottom: 0; }
    @media (max-width: 560px) {
      .form-row { grid-template-columns: 1fr; }
      .header h1 { font-size: 2.2rem; letter-spacing: -1.5px; }
    }

    /* ── Button — saffron gradient ── */
    .btn-explain {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      background: linear-gradient(135deg, #FF9933 0%, #F97316 40%, #D97706 100%);
      background-size: 200% 200%;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.97rem;
      font-family: inherit;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.3px;
      animation: gradShift 5s ease infinite;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
    }
    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .btn-explain:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px rgba(249,115,22,0.45);
    }
    .btn-explain:active:not(:disabled) { transform: translateY(0); }
    .btn-explain:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }

    /* ── Loading ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding: 52px;
      color: rgba(255,255,255,0.45);
    }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.07);
      border-top-color: #FF9933;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── Error ── */
    .error-box {
      margin-top: 20px;
      padding: 16px 20px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 12px;
      color: #fca5a5;
      font-size: 0.88rem;
      text-align: center;
    }

    /* ── Output card ── */
    .output-card {
      margin-top: 20px;
      animation: fadeUp 0.4s ease-out;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.055);
    }
    .output-title {
      font-size: 1.15rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .lang-badge {
      font-size: 0.73rem;
      color: rgba(255,255,255,0.32);
      font-weight: 500;
      margin-top: 5px;
    }
    .btn-copy {
      flex-shrink: 0;
      padding: 8px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      font-size: 0.78rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      color: rgba(255,255,255,0.45);
      transition: all 0.2s;
    }
    .btn-copy:hover {
      background: rgba(255,153,51,0.18);
      border-color: rgba(255,153,51,0.35);
      color: #fdba74;
    }
    .btn-copy.copied {
      background: rgba(22,163,74,0.15);
      border-color: rgba(22,163,74,0.35);
      color: #86efac;
    }

    /* ── Sections ── */
    .section { margin-bottom: 24px; }
    .section-tag {
      display: inline-flex;
      align-items: center;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: 12px;
    }
    /* saffron */
    .s1 .section-tag { background: rgba(249,115,22,0.18); color: #fdba74; border: 1px solid rgba(249,115,22,0.3); }
    /* gold / turmeric */
    .s2 .section-tag { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.28); }
    /* peacock blue */
    .s3 .section-tag { background: rgba(8,145,178,0.18);  color: #67e8f9; border: 1px solid rgba(8,145,178,0.3); }
    /* India green */
    .s4 .section-tag { background: rgba(22,163,74,0.16);  color: #86efac; border: 1px solid rgba(22,163,74,0.28); }
    /* crimson / sindoor */
    .s5 .section-tag { background: rgba(220,38,38,0.14);  color: #fca5a5; border: 1px solid rgba(220,38,38,0.25); }
    /* maroon / deep gold */
    .s6 .section-tag { background: rgba(180,83,9,0.15);   color: #fde68a; border: 1px solid rgba(180,83,9,0.28); }

    .section-body {
      font-size: 0.91rem;
      line-height: 1.85;
      color: rgba(255,255,255,0.68);
    }

    /* ── Pros / Cons grid ── */
    .pros-cons-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    @media (max-width: 560px) { .pros-cons-grid { grid-template-columns: 1fr; } }

    .bullet-list { list-style: none; padding: 0; }
    .bullet-list li {
      padding: 5px 0 5px 22px;
      position: relative;
      font-size: 0.89rem;
      line-height: 1.65;
      color: rgba(255,255,255,0.62);
    }
    .pros-list li::before { content: '✓'; position: absolute; left: 0; color: #4ade80; font-weight: 700; }
    .cons-list li::before { content: '✗'; position: absolute; left: 0; color: #f87171; font-weight: 700; }

    /* ── Summary — saffron left border ── */
    .summary-box {
      background: linear-gradient(135deg, rgba(255,153,51,0.08), rgba(251,191,36,0.05));
      border-left: 3px solid rgba(255,153,51,0.65);
      padding: 16px 20px;
      border-radius: 0 12px 12px 0;
      font-style: italic;
      color: rgba(255,255,255,0.72);
      line-height: 1.85;
      font-size: 0.91rem;
    }

    /* ── Divider — saffron fade ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,153,51,0.18) 30%, rgba(255,153,51,0.18) 70%, transparent);
      margin: 22px 0;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 24px 20px;
      color: rgba(255,255,255,0.16);
      font-size: 0.75rem;
      letter-spacing: 0.2px;
    }
  </style>
</head>
<body>
  <!-- Ambient blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Ashoka Chakra watermark (24-spoke wheel, slowly rotating) -->
  <div class="ashoka-bg">
    <svg class="ashoka" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="92" fill="none" stroke="currentColor" stroke-width="5"/>
      <circle cx="100" cy="100" r="78" fill="none" stroke="currentColor" stroke-width="1"/>
      <circle cx="100" cy="100" r="16" fill="currentColor"/>
      <!-- 24 spokes at 15° intervals -->
      <line x1="100" y1="86" x2="100" y2="11"     stroke="currentColor" stroke-width="1.5"/>
      <line x1="103.6" y1="86.5" x2="123" y2="14"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="107" y1="87.9" x2="144.5" y2="23"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="109.9" y1="90.1" x2="162.9" y2="37.1" stroke="currentColor" stroke-width="1.5"/>
      <line x1="112.1" y1="93" x2="177.1" y2="55.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="113.5" y1="96.4" x2="186" y2="77"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="114" y1="100" x2="189" y2="100"    stroke="currentColor" stroke-width="1.5"/>
      <line x1="113.5" y1="103.6" x2="186" y2="123" stroke="currentColor" stroke-width="1.5"/>
      <line x1="112.1" y1="107" x2="177.1" y2="144.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="109.9" y1="109.9" x2="162.9" y2="162.9" stroke="currentColor" stroke-width="1.5"/>
      <line x1="107" y1="112.1" x2="144.5" y2="177.1" stroke="currentColor" stroke-width="1.5"/>
      <line x1="103.6" y1="113.5" x2="123" y2="186" stroke="currentColor" stroke-width="1.5"/>
      <line x1="100" y1="114" x2="100" y2="189"    stroke="currentColor" stroke-width="1.5"/>
      <line x1="96.4" y1="113.5" x2="77" y2="186"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="92.9" y1="112.1" x2="55.5" y2="177.1" stroke="currentColor" stroke-width="1.5"/>
      <line x1="90.1" y1="109.9" x2="37.1" y2="162.9" stroke="currentColor" stroke-width="1.5"/>
      <line x1="87.9" y1="107" x2="22.9" y2="144.5" stroke="currentColor" stroke-width="1.5"/>
      <line x1="86.5" y1="103.6" x2="14" y2="123"  stroke="currentColor" stroke-width="1.5"/>
      <line x1="86" y1="100" x2="11" y2="100"       stroke="currentColor" stroke-width="1.5"/>
      <line x1="86.5" y1="96.4" x2="14" y2="77"     stroke="currentColor" stroke-width="1.5"/>
      <line x1="87.9" y1="93" x2="22.9" y2="55.5"   stroke="currentColor" stroke-width="1.5"/>
      <line x1="90.1" y1="90.1" x2="37.1" y2="37.1" stroke="currentColor" stroke-width="1.5"/>
      <line x1="92.9" y1="87.9" x2="55.5" y2="22.9" stroke="currentColor" stroke-width="1.5"/>
      <line x1="96.4" y1="86.5" x2="77" y2="14"     stroke="currentColor" stroke-width="1.5"/>
    </svg>
  </div>

  <div class="page-wrap">
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const { useState } = React;

    const USER_TYPES = [
      { value: 'general',        label: '🧑 General Citizen' },
      { value: 'student',        label: '🎓 Student' },
      { value: 'job_seeker',     label: '💼 Job Seeker' },
      { value: 'business_owner', label: '🏪 Business Owner' },
    ];

    const LANGUAGES = [
      { value: 'hinglish',  label: '🇮🇳 Hinglish (Hindi + English)' },
      { value: 'hindi',     label: '🔵 Hindi — हिंदी' },
      { value: 'bengali',   label: '🟠 Bengali — বাংলা' },
      { value: 'telugu',    label: '🟡 Telugu — తెలుగు' },
      { value: 'marathi',   label: '🟣 Marathi — मराठी' },
      { value: 'tamil',     label: '🔴 Tamil — தமிழ்' },
      { value: 'gujarati',  label: '🟢 Gujarati — ગુજરાતી' },
      { value: 'kannada',   label: '🔷 Kannada — ಕನ್ನಡ' },
      { value: 'malayalam', label: '🟤 Malayalam — മലയാളം' },
      { value: 'punjabi',   label: '🟨 Punjabi — ਪੰਜਾਬੀ' },
      { value: 'odia',      label: '⚪ Odia — ଓଡ଼ିଆ' },
    ];

    function OutputCard({ result, policyName, languageLabel }) {
      const [copied, setCopied] = useState(false);

      function buildPlainText() {
        return [
          `PolicyLens AI — ${policyName}`,
          '',
          'Simple Explanation',
          result.simple_explanation,
          '',
          'Why It Was Introduced',
          result.why_introduced,
          '',
          'Impact on You',
          result.personal_impact,
          '',
          'Benefits',
          ...result.pros.map(p => `• ${p}`),
          '',
          'Drawbacks',
          ...result.cons.map(c => `• ${c}`),
          '',
          'Summary',
          result.summary,
        ].join('\n');
      }

      function handleCopy() {
        navigator.clipboard.writeText(buildPlainText()).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2200);
        });
      }

      return (
        <div className="card output-card">
          <div className="output-header">
            <div>
              <div className="output-title">{policyName}</div>
              <div className="lang-badge">{languageLabel}</div>
            </div>
            <button
              className={`btn-copy${copied ? ' copied' : ''}`}
              onClick={handleCopy}
            >
              {copied ? '✓ Copied' : 'Copy'}
            </button>
          </div>

          <div className="section s1">
            <div className="section-tag">Simple Explanation</div>
            <div className="section-body">{result.simple_explanation}</div>
          </div>

          <div className="divider" />

          <div className="section s2">
            <div className="section-tag">Why It Was Introduced</div>
            <div className="section-body">{result.why_introduced}</div>
          </div>

          <div className="divider" />

          <div className="section s3">
            <div className="section-tag">Impact on You</div>
            <div className="section-body">{result.personal_impact}</div>
          </div>

          <div className="divider" />

          <div className="pros-cons-grid">
            <div className="section s4">
              <div className="section-tag">Benefits</div>
              <ul className="bullet-list pros-list">
                {result.pros.map((p, i) => <li key={i}>{p}</li>)}
              </ul>
            </div>
            <div className="section s5">
              <div className="section-tag">Drawbacks</div>
              <ul className="bullet-list cons-list">
                {result.cons.map((c, i) => <li key={i}>{c}</li>)}
              </ul>
            </div>
          </div>

          <div className="divider" />

          <div className="section s6">
            <div className="section-tag">Summary</div>
            <div className="summary-box">{result.summary}</div>
          </div>
        </div>
      );
    }

    function App() {
      const [policy, setPolicy]               = useState('');
      const [userType, setUserType]           = useState('general');
      const [language, setLanguage]           = useState('hinglish');
      const [loading, setLoading]             = useState(false);
      const [result, setResult]               = useState(null);
      const [error, setError]                 = useState('');
      const [displayPolicy, setDisplayPolicy] = useState('');
      const [displayLang, setDisplayLang]     = useState('');

      async function handleSubmit(e) {
        e.preventDefault();
        if (!policy.trim()) return;

        setLoading(true);
        setResult(null);
        setError('');
        setDisplayPolicy(policy.trim());
        setDisplayLang(LANGUAGES.find(l => l.value === language)?.label || '');

        try {
          const res = await fetch('/api/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ policy: policy.trim(), userType, language }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Request failed');
          setResult(data.result);
        } catch (err) {
          setError(err.message || 'Something went wrong. Please try again.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <>
          <div className="header">
            <div className="ai-badge">Made for Bharat 🇮🇳</div>
            <h1>Policy<span className="gradient">Lens</span> AI</h1>
            <p className="tagline">Understand any government policy — in your language</p>
            <div className="tricolor-stripe">
              <span className="tc-saffron" />
              <span className="tc-white" />
              <span className="tc-green" />
            </div>
          </div>

          <div className="container">
            <div className="card">
              <form onSubmit={handleSubmit}>
                <div className="form-group">
                  <label>Policy Name</label>
                  <input
                    type="text"
                    value={policy}
                    onChange={e => setPolicy(e.target.value)}
                    placeholder="e.g. GST, Budget 2024, NEP, Farm Bills, MGNREGA…"
                    disabled={loading}
                    autoFocus
                  />
                </div>

                <div className="form-row">
                  <div className="form-group">
                    <label>Who are you?</label>
                    <div className="select-wrapper">
                      <select
                        value={userType}
                        onChange={e => setUserType(e.target.value)}
                        disabled={loading}
                      >
                        {USER_TYPES.map(t => (
                          <option key={t.value} value={t.value}>{t.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="form-group">
                    <label>Language</label>
                    <div className="select-wrapper">
                      <select
                        value={language}
                        onChange={e => setLanguage(e.target.value)}
                        disabled={loading}
                      >
                        {LANGUAGES.map(l => (
                          <option key={l.value} value={l.value}>{l.label}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>

                <button
                  type="submit"
                  className="btn-explain"
                  disabled={loading || !policy.trim()}
                >
                  {loading ? '⏳ Analyzing…' : '🔍 Explain Policy'}
                </button>
              </form>
            </div>

            {loading && (
              <div className="loading-wrap">
                <div className="spinner" />
                <div className="loading-text">Analyzing policy, please wait… 🙏</div>
              </div>
            )}

            {error && !loading && (
              <div className="error-box">⚠️ {error}</div>
            )}

            {result && !loading && (
              <OutputCard result={result} policyName={displayPolicy} languageLabel={displayLang} />
            )}
          </div>

          <div className="footer">
            PolicyLens AI &nbsp;·&nbsp; Powered by AI &nbsp;·&nbsp; Made with ♥ for Bharat 🇮🇳
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
